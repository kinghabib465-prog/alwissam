services:
  - type: web
    name: alwissam-dental
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: COOKIE_SECURE
        value: "true"
      - key: PORT
        value: 3000
    healthCheckPath: /
    routes:
      - path: /

  - type: pserv
    name: alwissam-postgres
    plan: free
    ipAllowList: []
    postgresMajorVersion: 16

  - type: redis
    name: alwissam-redis
    plan: free
    ipAllowList: []
