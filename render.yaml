services:
  - type: web
    name: alwissam
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    preDeployCommand: npx prisma migrate deploy && node scripts/ensure-staff.mjs
    startCommand: npx prisma migrate deploy && node scripts/ensure-staff.mjs && next start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
